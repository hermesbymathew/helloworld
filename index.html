<!DOCTYPE html>
<html>
<head>
    <title>Hello World</title>
</head>
<body>
    <div id="app">{{ message }}</div>
    <script type="module">
        import { createApp } from 'vue';
        createApp({
            data() {
                return {
                    message: 'Hello World from Vue.js!'
                }
            }
        }).mount('#app');
    </script>
</body>
</html>
